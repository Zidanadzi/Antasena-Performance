name: Flutter Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Initialize Flutter Project
        run: |
          # 1. Backup our custom code
          mkdir -p custom_backup
          cp -r lib custom_backup/
          cp pubspec.yaml custom_backup/
          
          # 2. Clean and Setup platform folders
          rm -rf android ios web linux macos windows
          
          # 3. Create the flutter project structure
          flutter create . --project-name antasena_performance --org com.antasena.performance --overwrite
          
          # 4. Remove default test folder (it causes errors with custom app structure)
          rm -rf test
          
          # 5. Restore our custom code (CRITICAL: This prevents the "Flutter Demo" from appearing)
          rm -rf lib
          cp -r custom_backup/lib .
          cp custom_backup/pubspec.yaml .
          
          # 6. Fix Android Build Configuration (Standardized for Plugins)
          echo "Fixing Android build.gradle..."
          
          # A. Standard 'ext' properties approach in the root build.gradle
          sed -i "/buildscript {/a \    ext.compileSdkVersion = 34\n    ext.targetSdkVersion = 34\n    ext.minSdkVersion = 21" android/build.gradle

          # C. Fix the main app's build.gradle
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/g' android/app/build.gradle
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/g' android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle
          
          # D. Ensure local.properties is also populated
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties
          echo "flutter.minSdkVersion=21" >> android/local.properties
          
          # 7. Get dependencies
          flutter pub get
          
          # 8. Brute-force fix for plugins in pub cache (CRITICAL: Must run AFTER flutter pub get)
          # This replaces problematic 'flutter.xxx' variables with hardcoded values in all plugins.
          echo "Applying brute-force fix to plugins..."
          find /home/runner/.pub-cache -name "build.gradle" -exec sed -i 's/flutter.compileSdkVersion/34/g' {} +
          find /home/runner/.pub-cache -name "build.gradle" -exec sed -i 's/flutter.compileSdk/34/g' {} +
          find /home/runner/.pub-cache -name "build.gradle" -exec sed -i 's/flutter.targetSdkVersion/34/g' {} +
          find /home/runner/.pub-cache -name "build.gradle" -exec sed -i 's/flutter.targetSdk/34/g' {} +
          find /home/runner/.pub-cache -name "build.gradle" -exec sed -i 's/flutter.minSdkVersion/21/g' {} +
          find /home/runner/.pub-cache -name "build.gradle" -exec sed -i 's/flutter.minSdk/21/g' {} +
          
          # 9. Analyze and Build
          flutter analyze
          flutter build apk --release

      - name: Upload APK to Mirror (BashUpload)
        run: |
          echo "Uploading to mirror..."
          URL=$(curl https://bashupload.com/antasena-performance.apk --data-binary @build/app/outputs/flutter-apk/app-release.apk)
          echo "--------------------------------------------------"
          echo "MIRROR DOWNLOAD LINK:"
          echo $URL
          echo "--------------------------------------------------"
        continue-on-error: true

      - name: Upload APK to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: antasena-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
