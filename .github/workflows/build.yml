name: Flutter Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Initialize Flutter Project
        run: |
          flutter create . --project-name antasena_performance --org com.antasena.performance --overwrite
          # Backup our custom main.dart
          cp lib/main.dart lib/main.dart.bak
          # Ensure directories exist
          mkdir -p lib
          # Restore our custom main.dart over the default one
          mv lib/main.dart.bak lib/main.dart
          flutter pub get
          flutter build apk --release

      - name: Upload APK to Mirror (BashUpload)
        run: |
          echo "Uploading to mirror..."
          URL=$(curl https://bashupload.com/antasena-performance.apk --data-binary @build/app/outputs/flutter-apk/app-release.apk)
          echo "--------------------------------------------------"
          echo "MIRROR DOWNLOAD LINK:"
          echo $URL
          echo "--------------------------------------------------"
        continue-on-error: true

      - name: Upload APK to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: antasena-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
