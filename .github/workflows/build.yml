name: Flutter Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Initialize Flutter Project
        run: |
          # 1. Backup our custom code
          mkdir -p custom_backup
          cp -r lib custom_backup/
          cp pubspec.yaml custom_backup/
          
          # 2. Create the flutter project structure
          flutter create . --project-name antasena_performance --org com.antasena.performance --overwrite
          
          # 3. Restore our custom code
          rm -rf lib
          cp -r custom_backup/lib .
          cp custom_backup/pubspec.yaml .
          
          # 4. Fix Android Build Configuration (CRITICAL FIX)
          echo "Fixing Android build.gradle..."
          
          # Force set versions in app/build.gradle
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/g' android/app/build.gradle
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/g' android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle
          
          # Inject global flutter property and subproject SDK fix into root build.gradle
          # We use a technique that doesn't depend on afterEvaluate timing
          cat <<EOF >> android/build.gradle

          // Global fix for plugins that can't find flutter properties
          allprojects {
              ext.flutter = [
                  compileSdkVersion: 34,
                  targetSdkVersion: 34,
                  minSdkVersion: 21,
              ]
          }

          subprojects {
              project.plugins.configureEach {
                  if (it.class.name.contains('LibraryPlugin') || it.class.name.contains('AppPlugin')) {
                      project.android {
                          compileSdkVersion 34
                          if (project.hasProperty('buildToolsVersion')) {
                              buildToolsVersion "34.0.0"
                          }
                      }
                  }
              }
          }
          EOF

          # Ensure local.properties is correctly populated
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties
          echo "flutter.minSdkVersion=21" >> android/local.properties
          
          # 5. Get dependencies and build
          flutter pub get
          flutter build apk --release

      - name: Upload APK to Mirror (BashUpload)
        run: |
          echo "Uploading to mirror..."
          URL=$(curl https://bashupload.com/antasena-performance.apk --data-binary @build/app/outputs/flutter-apk/app-release.apk)
          echo "--------------------------------------------------"
          echo "MIRROR DOWNLOAD LINK:"
          echo $URL
          echo "--------------------------------------------------"
        continue-on-error: true

      - name: Upload APK to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: antasena-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
